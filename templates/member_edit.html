{% extends "base.html" %}
{% load static %}

{% block title %}내 정보 수정 | 탄소관리 플랫폼{% endblock %}

{% block scripts %}
{{ block.super }}
<script src="{% static 'js/sha1.js' %}" type="text/javascript"></script>
<script>
  function getCookie(n){var v=null;if(document.cookie&&document.cookie!==''){var c=document.cookie.split(';');for(var i=0;i<c.length;i++){var k=c[i].trim();if(k.substring(0,n.length+1)===(n+'=')){v=decodeURIComponent(k.substring(n.length+1));break;}}}return v;}
  function updateMember(){
    var name=document.getElementById('member_name').value;
    if(!name){document.getElementById('member_name').focus();return;}
    var email=document.getElementById('member_email').value;
    var xhr=new XMLHttpRequest();
    xhr.onreadystatechange=function(){if(xhr.readyState==4){var o=JSON.parse(xhr.responseText);alert(o.result_msg);if(o.flag=='0')location.href='/';}};
    xhr.open('GET','member_update?member_name='+name+'&member_email='+email);
    xhr.setRequestHeader('X-CSRFToken',getCookie('csrftoken'));
    xhr.send(null);
  }
</script>
{% endblock %}

{% block body %}
{% include "navbar.html" %}

<main id="main">
  <section id="breadcrumbs" class="breadcrumbs">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <h4>내 정보 수정</h4>
        <ol><li><a href="/">홈</a></li><li>내 정보 수정</li></ol>
      </div>
    </div>
  </section>

  <section style="padding:48px 0 64px;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">

          <div class="p-card">
            <div style="margin-bottom:28px;">
              <p style="font-size:.75em; font-weight:700; color:var(--g500); text-transform:uppercase; letter-spacing:.1em; margin-bottom:6px;">계정 관리</p>
              <h3 style="font-size:1.4em; font-weight:800; color:var(--tx1); margin:0;">내 정보 수정</h3>
            </div>

            <!-- 아이디 (읽기전용) -->
            <div style="margin-bottom:16px;">
              <label style="font-size:.8em; font-weight:700; color:var(--tx2); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; display:block;">아이디</label>
              <div style="background:var(--sf2); border:1px solid var(--border); border-radius:var(--r-sm); padding:12px 16px; color:var(--tx2); font-weight:600;">
                {{ member_id }}
              </div>
            </div>

            <!-- 이름 -->
            <div style="margin-bottom:16px;">
              <label style="font-size:.8em; font-weight:700; color:var(--tx2); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; display:block;">이름 <span style="color:var(--no);">*</span></label>
              <input type="text" id="member_name" class="form-control" value="{{ member_name }}" placeholder="이름">
            </div>

            <!-- 이메일 -->
            <div style="margin-bottom:28px;">
              <label style="font-size:.8em; font-weight:700; color:var(--tx2); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; display:block;">이메일</label>
              <input type="email" id="member_email" class="form-control" value="{{ member_email }}" placeholder="이메일">
            </div>

            <div style="display:flex; gap:10px;">
              <button onclick="location.href='/'" class="btn btn-outline-secondary" style="flex:1; color:var(--tx2); border-color:var(--border);">취소</button>
              <button onclick="updateMember();" class="btn btn-success" style="flex:2; padding:12px;">저장</button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </section>
</main>

{% include "footer.html" %}
{% endblock %}
